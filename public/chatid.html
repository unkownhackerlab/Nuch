<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Chat ID Finder</title>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body {
      background:#0a0a0a; color:#fff;
      font-family:'Segoe UI', sans-serif;
      display:flex; align-items:center; justify-content:center;
      min-height:100vh; padding:20px;
    }
    .container {
      background:#111; padding:30px; border-radius:12px;
      max-width:450px; width:100%; border:1px solid #333;
    }
    h1 { color:#e60000; font-size:24px; margin-bottom:5px; }
    .subtitle { color:#888; font-size:13px; margin-bottom:20px; }
    label { display:block; font-size:13px; color:#aaa; margin-bottom:6px; }
    input {
      width:100%; padding:12px; border-radius:8px;
      border:1px solid #333; background:#1a1a1a; color:#fff;
      font-size:14px; margin-bottom:15px;
    }
    input:focus { outline:none; border-color:#e60000; }
    button {
      width:100%; padding:12px; background:#e60000; color:white;
      border:none; border-radius:8px; font-weight:bold; cursor:pointer;
      margin-bottom:20px;
    }
    button:disabled { background:#555; cursor:not-allowed; }
    .result {
      display:none; background:#1a1a1a; border-radius:8px;
      padding:15px; border:1px solid #333;
    }
    .result h3 { color:#00cc66; font-size:14px; margin-bottom:10px; }
    .chat-item {
      background:#0a0a0a; padding:12px; border-radius:6px;
      margin-bottom:8px; border:1px solid #222;
      display:flex; justify-content:space-between; align-items:center;
    }
    .chat-name { font-weight:bold; font-size:14px; }
    .chat-type { font-size:11px; color:#888; text-transform:uppercase; margin-top:2px; }
    .chat-id {
      background:#e60000; color:white; padding:6px 12px;
      border-radius:4px; font-weight:bold; cursor:pointer;
    }
    .chat-id:hover { background:#ff1a1a; }
    .toast {
      position:fixed; bottom:30px; left:50%; transform:translateX(-50%);
      background:#00cc66; color:#000; padding:10px 25px;
      border-radius:20px; font-weight:bold; display:none; z-index:999;
    }
    .error { color:#ff4444; text-align:center; padding:10px; }
    .warning {
      background:#331a00; border:1px solid #ff8800;
      color:#ffaa00; padding:12px; border-radius:6px;
      margin-top:10px; font-size:13px; text-align:center;
    }
    .loading { text-align:center; color:#888; padding:20px; }
    .spinner {
      width:30px; height:30px; border:3px solid #333;
      border-top-color:#e60000; border-radius:50%;
      animation:spin 0.8s linear infinite; margin:0 auto 10px;
    }
    @keyframes spin { to { transform:rotate(360deg); } }
  </style>
</head>
<body>
  <div class="container">
    <h1>🔍 Chat ID Finder</h1>
    <p class="subtitle">Find the Chat ID for your Telegram bot</p>

    <label for="token">Bot Token</label>
    <input type="text" id="token" placeholder="123456:ABC-DEF1234gh...">

    <button id="findBtn" onclick="findChatId()">Find Chat IDs</button>

    <div id="loading" class="loading" style="display:none;">
      <div class="spinner"></div>
      <p>Fetching...</p>
    </div>

    <div id="result" class="result"></div>
    <div id="error" class="error"></div>
  </div>

  <div class="toast" id="toast">Copied!</div>

  <script>
    async function findChatId() {
      const token = document.getElementById('token').value.trim();
      const btn = document.getElementById('findBtn');
      const resultDiv = document.getElementById('result');
      const errorDiv = document.getElementById('error');
      const loading = document.getElementById('loading');

      if (!token) {
        errorDiv.textContent = 'Please enter your bot token';
        resultDiv.style.display = 'none';
        return;
      }

      btn.disabled = true;
      loading.style.display = 'block';
      resultDiv.style.display = 'none';
      errorDiv.textContent = '';

      try {
        const res = await fetch('/get-chat-id', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ token })
        });
        const data = await res.json();

        if (!data.success && data.error) {
          errorDiv.textContent = data.error;
          return;
        }

        if (data.chats.length === 0) {
          resultDiv.innerHTML = `<div class="warning">⚠️ No chats found!<br>Send a message to your bot first, then try again.</div>`;
          resultDiv.style.display = 'block';
          return;
        }

        let html = '<h3>✅ Found Chat IDs</h3>';
        data.chats.forEach(chat => {
          html += `
            <div class="chat-item">
              <div>
                <div class="chat-name">${chat.name}</div>
                <div class="chat-type">${chat.type} ${chat.username !== 'N/A' ? '| @'+chat.username : ''}</div>
              </div>
              <div class="chat-id" onclick="copyId('${chat.id}')" title="Click to copy">${chat.id}</div>
            </div>`;
        });
        resultDiv.innerHTML = html;
        resultDiv.style.display = 'block';
      } catch (err) {
        errorDiv.textContent = 'Network error. Please try again.';
      } finally {
        btn.disabled = false;
        loading.style.display = 'none';
      }
    }

    function copyId(id) {
      navigator.clipboard.writeText(id.toString());
      const toast = document.getElementById('toast');
      toast.style.display = 'block';
      setTimeout(() => toast.style.display = 'none', 1500);
    }

    document.getElementById('token').addEventListener('keypress', e => {
      if (e.key === 'Enter') findChatId();
    });
  </script>
</body>
</html>
